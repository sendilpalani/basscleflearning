<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bass Clef Note Trainer</title>
  <style>
    @font-face {
      font-family: 'Bravura';
      src: url('https://cdn.jsdelivr.net/npm/bravura/redist/Bravura.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/npm/bravura/redist/Bravura.woff') format('woff');
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 { font-size: 2rem; color: #a78bfa; margin-bottom: 0.25rem; }
    .subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }

    .staff-container {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      cursor: crosshair;
    }

    #note-display {
      margin-top: 1.5rem;
      font-size: 3rem;
      font-weight: bold;
      color: #a78bfa;
      min-height: 4rem;
      text-align: center;
    }

    .hint { color: #666; font-size: 0.85rem; margin-top: 0.5rem; }
  </style>
</head>
<body>

<h1>Bass Clef Trainer</h1>
<p class="subtitle">Click anywhere on the staff to identify a note</p>

<div class="staff-container">
  <svg id="staff" width="280" height="220" viewBox="0 0 280 220"></svg>
</div>

<div id="note-display"></div>
<p class="hint">Click on a line or space to see the note name</p>

<script>
  const LINE_SPACING = 24;
  const STAFF_TOP    = 60;
  const STAFF_LEFT   = 70;
  const STAFF_RIGHT  = 260;

  // pos 0 = bottom staff line (G2), each +1 = one staff position up (line→space→line…)
  // half-integer positions = spaces, integers = lines
  const NOTE_AT_POS = {
    '-2':  'C2',
    '-1.5':'D2',
    '-1':  'E2',
    '-0.5':'F2',
     '0':  'G2',
     '0.5':'A2',
     '1':  'B2',
     '1.5':'C3',
     '2':  'D3',
     '2.5':'E3',
     '3':  'F3',
     '3.5':'G3',
     '4':  'A3',
     '4.5':'B3',
     '5':  'C4',
     '5.5':'D4',
     '6':  'E4',
  };

  function posToY(pos) {
    return STAFF_TOP + (4 - pos) * LINE_SPACING;
  }

  function yToPos(y) {
    // Snap to nearest half-position
    const raw = 4 - (y - STAFF_TOP) / LINE_SPACING;
    return Math.round(raw * 2) / 2;
  }

  function svg_el(tag, attrs, parent) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    parent.appendChild(el);
    return el;
  }

  function drawStaff(svg, highlightPos, noteX) {
    svg.innerHTML = '';

    // 5 staff lines
    for (let i = 0; i < 5; i++) {
      const y = STAFF_TOP + i * LINE_SPACING;
      svg_el('line', { x1: STAFF_LEFT, y1: y, x2: STAFF_RIGHT, y2: y,
                       stroke: '#444', 'stroke-width': 1.5 }, svg);
    }

    // Bass clef
    drawBassClef(svg);

    if (highlightPos === null) return;

    const noteY = posToY(highlightPos);

    // Ledger lines
    if (highlightPos <= -1 && highlightPos % 1 === 0) {
      for (let lp = -2; lp >= highlightPos; lp -= 1) {
        if (lp % 1 === 0)
          svg_el('line', { x1: noteX - 18, y1: posToY(lp), x2: noteX + 18, y2: posToY(lp),
                           stroke: '#444', 'stroke-width': 1.5 }, svg);
      }
    }
    if (highlightPos >= 5 && highlightPos % 1 === 0) {
      for (let lp = 5; lp <= highlightPos; lp += 1) {
        svg_el('line', { x1: noteX - 18, y1: posToY(lp), x2: noteX + 18, y2: posToY(lp),
                         stroke: '#444', 'stroke-width': 1.5 }, svg);
      }
    }

    // Note head
    const noteEl = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
    noteEl.setAttribute('cx', noteX);
    noteEl.setAttribute('cy', noteY);
    noteEl.setAttribute('rx', 12);
    noteEl.setAttribute('ry', 9);
    noteEl.setAttribute('fill', '#7c3aed');
    noteEl.setAttribute('transform', `rotate(-15, ${noteX}, ${noteY})`);
    svg.appendChild(noteEl);

    // Stem
    const stemDir = highlightPos >= 2 ? -1 : 1;
    const stemX   = stemDir === 1 ? noteX + 11 : noteX - 11;
    svg_el('line', { x1: stemX, y1: noteY, x2: stemX, y2: noteY - stemDir * 55,
                     stroke: '#7c3aed', 'stroke-width': 2 }, svg);
  }

  function drawBassClef(svg) {
    const t = STAFF_TOP;
    const s = LINE_SPACING;

    // 𝄢 is the SMuFL bass clef character (U+1D122), rendered via Bravura font.
    // The glyph baseline sits on the F line (4th line from bottom = pos 3).
    const fLineY = t + (4 - 3) * s;
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', '4');
    text.setAttribute('y', fLineY + s * 2.5);
    text.setAttribute('font-family', 'Bravura, serif');
    text.setAttribute('font-size', `${s * 5.5}px`);
    text.setAttribute('fill', '#444');
    text.textContent = '𝄢';
    svg.appendChild(text);
  }

  const svgEl = document.getElementById('staff');
  const display = document.getElementById('note-display');

  drawStaff(svgEl, null, null);

  svgEl.addEventListener('click', (e) => {
    const rect = svgEl.getBoundingClientRect();
    const scaleX = 280 / rect.width;
    const scaleY = 220 / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    // Clamp x so note stays within the staff and clear of the bass clef
    const noteX = Math.max(80, Math.min(x, STAFF_RIGHT - 20));

    const pos = yToPos(y);
    const key = String(pos);
    const note = NOTE_AT_POS[key];

    if (note) {
      drawStaff(svgEl, pos, noteX);
      display.textContent = note;
    }
  });
</script>
</body>
</html>
